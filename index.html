<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🥊 SLAVATONE!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="screen-intro" class="screen active">
    
    <div id="scene-1" class="intro-scene show">
      <img src="assets/intro-1.png" alt="Fischietta" class="intro-img">
    </div>

    <div id="scene-2" class="intro-scene">
      <div id="swear-bubble" class="speech-bubble">@#! cane</div>
      <img src="assets/intro-1.png" alt="Parolacce" class="intro-img">
    </div>

    <div id="scene-3" class="intro-scene">
      <img src="assets/intro-wife.png" alt="Moglie furiosa" class="intro-img">
    </div>

    <div id="scene-4" class="intro-scene">
      <img src="assets/intro-terrified.png" alt="Marito terrorizzato" class="intro-img">
    </div>

  </section>

  <section id="screen-menu" class="screen">
    <h1 class="title">🥊 SLAVATONE!</h1>
    <p class="highscore">Miglior Punteggio: <span id="high-score-display">0</span> PC</p>
    <button id="btn-start" class="btn">▶ GIOCA</button>
  </section>

  <section id="screen-game" class="screen">
    <div class="top-bar">
      <div>Schiaffi: <span id="game-slaps">0</span></div>
      <div id="timer">30.0</div>
    </div>

    <div class="face-wrapper">
      <img id="face-sprite" src="assets/faccia-0.png" alt="Volto" class="face-img">
    </div>

    <div class="stats-row">
      <div>Punti Azione: <span id="game-ap">0</span></div>
      <div>Livello: <span id="game-level">0</span></div>
    </div>

    <button id="btn-slap" class="btn btn-slap">👋 SCHIAFFO!</button>
  </section>

  <section id="screen-end" class="screen">
    <h1 class="title end-title">FINE!</h1>
    
    <div class="face-wrapper small">
      <img id="final-face-sprite" src="assets/faccia-0.png" alt="Volto Finale" class="face-img">
    </div>

    <div class="game-over-stats">
      <div>Schiaffi totali: <span id="end-slaps">0</span></div>
      <div>Punti Azione: <span id="end-ap">0</span></div>
      <div>Bonus Livello: <span id="end-bonus">0</span></div>
      <div class="total-score">TOTALE: <span id="end-total">0</span> PC</div>
    </div>

    <button id="btn-restart" class="btn">🔄 RIGIOCA</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
