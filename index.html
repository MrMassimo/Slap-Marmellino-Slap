<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slap Marmellino Slap 🥊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">

        <div id="screen-intro" class="screen">
            <div class="intro-scene">
                <div id="intro-bubble" class="speech-bubble hidden"></div>
                
                <div class="intro-characters">
                    <div id="intro-husband-container">
                        <img id="intro-husband" src="intro-1.png" alt="Marito">
                        <div id="sweat-drops" class="hidden">
                            <span class="drop d1">💧</span>
                            <span class="drop d2">💧</span>
                        </div>
                    </div>
                    
                    <img id="intro-wife" src="intro-wife.png" alt="Moglie Arrabbiata" class="hidden-wife">
                </div>
            </div>
        </div>

        <div id="screen-menu" class="screen hidden">
            <h1 class="game-title">🥊 SLAP MARMELLINO SLAP!</h1>
            <p class="game-subtitle">Il gioco in cui raddrizzi la giornata a suon di sberle!</p>
            
            <div class="menu-card">
                <button id="btn-play" class="btn btn-primary">▶ PLAY</button>
                <div class="highscore-container">
                    <span class="highscore-icon">🏆</span>
                    <span class="highscore-text">Miglior Punteggio: <strong id="val-best-score">0</strong></span>
                </div>
            </div>
        </div>

        <div id="screen-game" class="screen hidden">
            <div class="game-header">
                <div class="timer-box">
                    <span>TEMPO: </span>
                    <span id="game-timer">10</span>s
                </div>
            </div>

            <div class="stats-panel">
                <div class="stat-box">
                    <span class="label">SCHIAFFI</span>
                    <span id="stat-slaps" class="value">0</span>
                </div>
                <div class="stat-box">
                    <span class="label">LIVELLO</span>
                    <span id="stat-level" class="value">0</span>
                </div>
                <div class="stat-box">
                    <span class="label">PUNTI AZIONE</span>
                    <span id="stat-ap" class="value">0</span>
                </div>
            </div>

            <div class="face-stage">
                <div id="face-wrapper">
                    <img id="game-face" src="faccia-0.png" alt="Faccia Marmellino">
                    <div id="slap-effects-container"></div>
                </div>
            </div>

            <div class="action-area">
                <button id="btn-slap" class="btn btn-slap">👋 SLAP!</button>
            </div>
        </div>

        <div id="screen-final" class="screen hidden">
            <h2 class="final-title">GAME OVER!</h2>
            
            <div class="final-face-container">
                <img id="final-face-img" src="faccia-0.png" alt="Faccia Finale">
            </div>

            <div class="score-board">
                <div class="board-row">
                    <span>Schiaffi Totali:</span>
                    <strong id="final-slaps">0</strong>
                </div>
                <div class="board-row">
                    <span>Punti Azione (Schiaffi / 10):</span>
                    <strong id="final-ap">0</strong>
                </div>
                <div class="board-row">
                    <span>Bonus Livello:</span>
                    <strong id="final-level-bonus">0</strong>
                </div>
                <hr class="board-divider">
                <div class="board-row total-row">
                    <span>PUNTEGGIO FINALE:</span>
                    <strong id="final-total-score">0</strong>
                </div>
            </div>

            <button id="btn-replay" class="btn btn-secondary">🔄 GIOCA ANCORA</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
