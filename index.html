<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>👋 SLap Marmellino Slap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================================
       SCHERMATA A) INTRO – 5 scene animate
       ============================================================ -->
  <div id="screen-intro" class="screen active">

    <!-- Scena 1 (0-1s): Protagonista fischietta beatamente -->
    <div class="intro-scene" id="intro-scene-1">
      <img src="assets/intro-1.png" class="intro-char" alt="Protagonista">
      <div class="music-notes">
        <span>♪</span><span>♫</span><span>♬</span>
      </div>
    </div>

    <!-- Scena 2 (1-3s): Fumetto con insulti che scorrono -->
    <div class="intro-scene" id="intro-scene-2">
      <img src="assets/intro-1.png" class="intro-char" alt="Protagonista">
      <div class="speech-bubble" id="speech-bubble">@#! cane</div>
    </div>

    <!-- Scena 3 (3-4s): Moglie irrompe da sinistra -->
    <div class="intro-scene" id="intro-scene-3">
      <img src="assets/intro-wife.png" class="intro-wife" alt="Moglie">
    </div>

    <!-- Scena 4 (4-5s): Protagonista terrorizzato, goccia di sudore -->
    <div class="intro-scene" id="intro-scene-4">
      <!-- Background-image per poter usare background-position sulle 3 pose -->
      <div class="terrified-bg" id="terrified-bg"></div>
      <div class="sweat-drop"></div>
    </div>

    <!-- Scena 5 (5-6s): Dissolvenza incrociata verso il Menu -->
    <div class="intro-scene" id="intro-scene-5">
      <div class="fade-overlay"></div>
    </div>
  </div>

  <!-- ============================================================
       SCHERMATA B) MENU
       ============================================================ -->
  <div id="screen-menu" class="screen">
    <h1>👋 SLap Marmellino Slap</h1>
    <button id="btn-play">▶ GIOCA</button>
    <div id="best-score-display">🏆 Miglior Punteggio: <span id="best-score-value">0</span></div>
  </div>

  <!-- ============================================================
       SCHERMATA C) GIOCO
       ============================================================ -->
  <div id="screen-game" class="screen">
    <div id="timer">30</div>

    <!-- Contenitore volto con cerchio bianco -->
    <div class="face-container" id="face-container">
      <img id="face-img" src="assets/faccia-0.png" alt="Volto">
    </div>

    <div id="stats">
      <span>👋 Schiaffi: <span id="slap-count">0</span></span>
      <span>⭐ Punti Azione: <span id="action-points">0</span></span>
      <span>💥 Livello: <span id="level">0</span></span>
    </div>

    <button id="btn-slap">👋 SCHIAFFO!</button>
  </div>

  <!-- ============================================================
       SCHERMATA D) GAME OVER
       ============================================================ -->
  <div id="screen-gameover" class="screen">
    <div class="face-container gameover" id="gameover-face-container">
      <img id="gameover-face" src="assets/faccia-0.png" alt="Volto">
    </div>

    <div id="final-stats">
      <h2>💀 RISULTATO FINALE</h2>
      <div class="stat-row">
        <span>👋 Schiaffi totali:</span>
        <span id="final-slaps">0</span>
      </div>
      <div class="stat-row">
        <span>⭐ Punti Azione:</span>
        <span id="final-action">0</span>
      </div>
      <div class="stat-row">
        <span>💥 Bonus Livello:</span>
        <span id="final-bonus">0</span>
      </div>
      <div class="stat-row total">
        <span>🏆 PUNTEGGIO TOTALE:</span>
        <span id="final-total">0</span>
      </div>
    </div>

    <button id="btn-replay">🔄 RIGIOCA</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
