<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marmellino Slap Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- SCHERMATA DI INTRO / STORIA -->
        <div id="intro-screen" class="screen active">
            <h1 class="game-title">MARMELLINO</h1>
            <p class="subtitle">Il fischietto molesto</p>
            
            <div class="avatar-container animate-float">
                <img id="intro-img" src="assets/intro-1.png" alt="Marmellino">
                <div id="speech-bubble" class="speech-bubble hidden">Fiuuu~ 😙♪</div>
            </div>

            <div id="intro-story-text" class="story-text">
                Marmellino adora fischiettare allegro in salotto...
            </div>

            <button id="next-btn" class="btn btn-primary">Avanti</button>
            <button id="start-btn" class="btn btn-danger hidden">Schiaffeggialo!</button>
        </div>

        <!-- SCHERMATA DI GIOCO -->
        <div id="play-screen" class="screen">
            <div class="game-header">
                <div class="stat-badge">Livello: <span id="level-display">0</span></div>
                <div class="stat-badge">Punti: <span id="score-display">0</span></div>
            </div>

            <!-- Barra del Tempo -->
            <div class="timer-container">
                <div id="timer-bar"></div>
            </div>

            <!-- Personaggio Attivo -->
            <div class="character-area">
                <div id="character-wrapper">
                    <img id="game-face" src="assets/faccia-0.png" alt="Marmellino">
                    <div id="slap-flash">💥 SLAP!</div>
                </div>
            </div>

            <p class="instruction">Clicca o tocca ripetutamente la faccia per riempire la barra!</p>

            <!-- Barra di Progresso Livello -->
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="progress-label">Riempi per superare il livello!</div>
        </div>

        <!-- SCHERMATA DI FINE GIOCO -->
        <div id="gameover-screen" class="screen">
            <h1 class="game-over-title">GIOCO FINITO!</h1>
            
            <div class="avatar-container">
                <img id="end-face" src="assets/faccia-5.jpg" alt="Marmellino">
            </div>

            <div class="stats-card">
                <p>Livello Massimo Raggiunto: <strong id="max-level-reached" class="text-yellow">0</strong></p>
                <p>Punti Totali: <strong id="final-score" class="text-green">0</strong></p>
            </div>

            <button id="restart-btn" class="btn btn-primary">Gioca Ancora</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
